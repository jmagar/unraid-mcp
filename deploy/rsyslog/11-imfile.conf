# /etc/rsyslog.d/11-imfile.conf
# Load imfile once for all file-tail drop-ins.
#
# rsyslog 8.2504 rejects duplicate module(load="imfile") declarations, so
# source-specific drop-ins rely on this shared loader being installed first.
#
# MaxMessageSize 256k handles long URLs, stack traces, AdGuard JSON fields,
# and AI transcript records without source-specific drop-ins lowering the
# limit later in lexical load order.

$MaxMessageSize 256k
module(load="imfile")
