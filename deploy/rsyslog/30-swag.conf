# /etc/rsyslog.d/30-swag.conf
# Tail SWAG nginx access/error logs and fail2ban events.
#
# Deploy on: squirts only.
#
# Source paths verified on squirts:
#   find /mnt /opt /srv -path '*/nginx/access.log' 2>/dev/null
#   find /mnt /opt /srv -path '*/nginx/error.log' 2>/dev/null
#   find /mnt /opt /srv -path '*/fail2ban/fail2ban.log' 2>/dev/null
# Current squirts path: /mnt/appdata/swag/log/...
#
# startmsg.regex on fail2ban anchors on the YYYY-MM-DD timestamp prefix so
# multi-line ban/unban events don't fragment.

input(type="imfile"
      File="/mnt/appdata/swag/log/nginx/access.log"
      Tag="swag-access"
      Facility="local4"
      Severity="info"
      FreshStartTail="on"
      PersistStateInterval="100")

input(type="imfile"
      File="/mnt/appdata/swag/log/nginx/error.log"
      Tag="swag-error"
      Facility="local4"
      Severity="warning"
      FreshStartTail="on"
      PersistStateInterval="100")

input(type="imfile"
      File="/mnt/appdata/swag/log/fail2ban/fail2ban.log"
      Tag="fail2ban"
      Facility="local5"
      Severity="info"
      startmsg.regex="^[0-9]{4}-[0-9]{2}-[0-9]{2}"
      FreshStartTail="on"
      PersistStateInterval="100")
