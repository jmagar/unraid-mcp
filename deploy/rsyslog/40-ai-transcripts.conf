# /etc/rsyslog.d/40-ai-transcripts.conf
# Tail claude/codex/gemini transcripts so syslog-mcp can correlate AI session
# activity with infrastructure events by host + time. axon already has these
# transcripts for semantic recall — this is the structured-query pipeline.
#
# Deploy on: dookie, squirts, steamy-wsl, vivobook-wsl.
#
# The shared 11-imfile.conf MaxMessageSize handles tool results and large diffs.
#
# addMetadata=on attaches the source filename (project path) so individual
# claude projects can be filtered server-side.

# Current homelab user path: /home/jmagar.

input(type="imfile"
      File="/home/jmagar/.claude/projects/*/*.jsonl"
      Tag="claude-transcript"
      Facility="local7"
      Severity="info"
      addMetadata="on"
      FreshStartTail="on"
      PersistStateInterval="50")

input(type="imfile"
      File="/home/jmagar/.codex/sessions/202[0-9]/*/*/*.jsonl"
      Tag="codex-transcript"
      Facility="local7"
      Severity="info"
      addMetadata="on"
      FreshStartTail="on"
      PersistStateInterval="50")

input(type="imfile"
      File="/home/jmagar/.gemini/tmp/*/chats/session-*.json"
      Tag="gemini-transcript"
      Facility="local7"
      Severity="info"
      addMetadata="on"
      FreshStartTail="on"
      PersistStateInterval="50")
