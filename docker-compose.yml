name: unrust

# Local development stack. Builds from this checkout.
services:
  unraid-mcp:
    extends:
      file: docker-compose.prod.yml
      service: unraid-mcp
    image: unrust:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile

networks:
  jakenet:
    name: ${DOCKER_NETWORK:-jakenet}
    external: true
