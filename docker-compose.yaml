services:
  unraid-mcp:
    build: .
    container_name: unraid-mcp
    restart: unless-stopped
    # The credentials volume (unraid-mcp-credentials) is created chmod-700 owned by
    # uid 1000, so PUID must remain 1000 unless you re-chown the volume to match.
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      # Published on loopback only by default: the MCP tool surface includes
      # destructive actions and is commonly run with DISABLE_HTTP_AUTH=true behind
      # SWAG, so it must NOT be reachable directly from the network.
      # Publishing on a non-loopback interface REQUIRES auth enabled (a bearer
      # token via UNRAID_MCP_TOKEN). Behind a reverse proxy, prefer joining the
      # proxy's docker network over publishing the port at all.
      - "127.0.0.1:${UNRAID_MCP_PORT:-6970}:${UNRAID_MCP_PORT:-6970}"
    env_file:
      - ~/.claude-homelab/.env
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      - unraid-mcp-credentials:/home/mcp/.unraid-mcp
    networks:
      - jakenet
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          if [ "${UNRAID_MCP_TRANSPORT:-streamable-http}" = "stdio" ]; then
            exit 0
          fi
          wget -qO- "http://localhost:${UNRAID_MCP_PORT:-6970}/health" > /dev/null
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  unraid-mcp-credentials:

networks:
  jakenet:
    name: ${DOCKER_NETWORK:-jakenet}
    external: true
