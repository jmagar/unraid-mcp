services:
  unraid-mcp:
    build: .
    container_name: unraid-mcp
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${UNRAID_MCP_PORT:-6970}:${UNRAID_MCP_PORT:-6970}"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      - unraid-mcp-credentials:/home/mcp/.unraid-mcp
    networks:
      - default
      - ${DOCKER_NETWORK:-unraid-mcp-external}
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:${UNRAID_MCP_PORT:-6970}/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  unraid-mcp-credentials:

networks:
  default: {}
  unraid-mcp-external:
    external: true
    name: ${DOCKER_NETWORK:-unraid-mcp-external}
