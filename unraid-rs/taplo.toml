[formatting]
align_entries = false
array_trailing_comma = true
array_auto_expand = true
array_auto_collapse = true
compact_arrays = true
compact_inline_tables = false
column_width = 100
indent_tables = false
indent_string = "  "
trailing_newline = true
reorder_keys = false
reorder_arrays = false
crlf = false

[[rule]]
name = "Cargo.toml"
include = ["**/Cargo.toml"]
keys = ["package", "lib", "bin", "dependencies", "dev-dependencies", "build-dependencies", "features", "workspace", "profile"]
