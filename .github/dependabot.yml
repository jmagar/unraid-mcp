# Dependabot configuration.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Keep the SHA-pinned GitHub Actions fresh.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep the Dockerfile base images fresh.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python dependencies (pyproject.toml + uv.lock, including dependency-groups).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
