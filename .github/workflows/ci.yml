name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.25"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Ruff check
        run: uv run ruff check unraid_mcp/ tests/
      - name: Ruff format
        run: uv run ruff format --check unraid_mcp/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.25"
      - name: Install dependencies
        run: uv sync --group dev
      - name: ty check
        run: uv run ty check unraid_mcp/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.25"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests with coverage (excluding integration/slow)
        run: uv run pytest -m "not slow and not integration" --cov=unraid_mcp --cov-report=term-missing --tb=short -q

  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all version files are in sync
        run: |
          TOML_VER=$(grep '^version = ' pyproject.toml | sed 's/version = "//;s/"//')
          CLAUDE_VER=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          CODEX_VER=$(python3 -c "import json; print(json.load(open('.codex-plugin/plugin.json'))['version'])")
          GEMINI_VER=$(python3 -c "import json; print(json.load(open('gemini-extension.json'))['version'])")
          echo "pyproject.toml:            $TOML_VER"
          echo ".claude-plugin/plugin.json: $CLAUDE_VER"
          echo ".codex-plugin/plugin.json:  $CODEX_VER"
          echo "gemini-extension.json:      $GEMINI_VER"
          FAIL=0
          for VER in "$CLAUDE_VER" "$CODEX_VER" "$GEMINI_VER"; do
            if [ "$TOML_VER" != "$VER" ]; then FAIL=1; fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "ERROR: Version mismatch — all four files must match pyproject.toml ($TOML_VER)"
            exit 1
          fi
          echo "All versions in sync: $TOML_VER"

  e2e:
    name: E2E HTTP Auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t unraid-mcp-ci .

      - name: Start server with bearer auth enabled
        run: |
          docker run -d \
            --name unraid-mcp-ci \
            -p 6970:6970 \
            -e UNRAID_MCP_TRANSPORT=streamable-http \
            -e UNRAID_MCP_BEARER_TOKEN=ci-test-token-e2e \
            -e UNRAID_MCP_DISABLE_HTTP_AUTH=false \
            -e UNRAID_API_URL=http://127.0.0.1:1 \
            -e UNRAID_API_KEY=ci-fake-key \
            unraid-mcp-ci

      - name: Wait for server to be healthy
        run: |
          echo "Waiting for /health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6970/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become healthy in 30s"
          docker logs unraid-mcp-ci
          exit 1

      - name: Run HTTP e2e tests (Phases 1-3, auth enabled)
        run: |
          bash tests/mcporter/test-http.sh \
            --url http://localhost:6970/mcp \
            --token ci-test-token-e2e \
            --skip-tools

      - name: Dump server logs on failure
        if: failure()
        run: docker logs unraid-mcp-ci

      - name: Stop server
        if: always()
        run: docker rm -f unraid-mcp-ci || true

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.25"
      - name: Dependency audit
        run: uv audit
