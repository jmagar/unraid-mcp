name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly blocking live smoke on a tailnet-connected self-hosted runner.
    - cron: "23 7 * * 1"
  workflow_dispatch:  # manual trigger for the live Unraid smoke test (mcp-integration)

# Least-privilege default for GITHUB_TOKEN; jobs elevate only if they need to.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Ruff check
        run: uv run ruff check unraid_mcp/ tests/
      - name: Ruff format
        run: uv run ruff format --check unraid_mcp/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: ty check
        run: uv run ty check unraid_mcp/

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.9.25"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run tests with coverage (excluding integration/slow)
        run: uv run pytest -m "not slow and not integration" --cov=unraid_mcp --cov-report=term-missing --tb=short -q

  e2e:
    name: Integration & Mock Roundtrip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install mock server dependencies
        run: npm --prefix tests/mock ci
      - name: Install Python dependencies
        run: uv sync --locked --group dev
      - name: Run integration & mock roundtrip tests
        run: uv run pytest -m "integration or mockserver" --tb=short -q

  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check all version files are in sync
        run: bash scripts/check-version-sync.sh

  mcp-integration:
    name: MCP Integration Tests
    runs-on: [self-hosted, linux, tailscale]
    timeout-minutes: 15
    # Live smoke test against the REAL Unraid box (via repo secrets). The homelab
    # Unraid API lives on a private/Tailscale network that GitHub's cloud runners
    # cannot reach, so this can never pass on a hosted runner — it is therefore a
    # Runs weekly and on demand on the tailnet-connected runner. This gate is
    # deliberately blocking: protocol, discovery, representative non-destructive
    # reads, subscriptions, Docker, and stdio must all work against the real API.
    needs: [lint, typecheck, test]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    env:
      UNRAID_API_URL: ${{ secrets.UNRAID_API_URL }}
      UNRAID_API_KEY: ${{ secrets.UNRAID_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Require live non-destructive credentials
        run: |
          test -n "$UNRAID_API_URL"
          test -n "$UNRAID_API_KEY"
      - name: Run blocking live transport and packaged-container smoke
        run: bash tests/test_live.sh

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Export locked application runtime graph
        run: |
          uv export --frozen --no-dev --no-emit-project \
            --format requirements-txt --no-hashes \
            --output-file audit-requirements.txt
          for package in fastmcp httpx cryptography; do
            grep -E "^${package}==" audit-requirements.txt
          done
      - name: Audit locked application runtime graph
        run: uv tool run --from pip-audit==2.10.1 pip-audit --requirement audit-requirements.txt

  package-artifact:
    name: Package Artifact Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Build clean source artifacts
        run: uv build --no-sources
      - name: Validate package metadata and contents
        run: |
          uv tool run --from twine==6.2.0 twine check dist/*
          unzip -l dist/*.whl | tee wheel-contents.txt
          grep -q 'unraid_mcp/server.py' wheel-contents.txt
          grep -q 'licenses/LICENSE' wheel-contents.txt
      - name: Install wheel in a clean environment
        run: |
          uv venv --python 3.12 .artifact-venv
          uv pip install --python .artifact-venv/bin/python dist/*.whl
          .artifact-venv/bin/python -c 'import importlib.metadata; assert importlib.metadata.version("unraid-mcp")'
      - name: Smoke installed wheel over stdio
        run: bash scripts/smoke-stdio.sh .artifact-venv/bin/unraid-mcp-server

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
