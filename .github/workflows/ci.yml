name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:  # manual trigger for the live Unraid smoke test (mcp-integration)

# Least-privilege default for GITHUB_TOKEN; jobs elevate only if they need to.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Ruff check
        run: uv run ruff check unraid_mcp/ tests/
      - name: Ruff format
        run: uv run ruff format --check unraid_mcp/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: ty check
        run: uv run ty check unraid_mcp/

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          version: "0.9.25"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run tests with coverage (excluding integration/slow)
        run: uv run pytest -m "not slow and not integration" --cov=unraid_mcp --cov-report=term-missing --tb=short -q

  e2e:
    name: Integration & Mock Roundtrip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install mock server dependencies
        run: npm --prefix tests/mock ci
      - name: Install Python dependencies
        run: uv sync --locked --group dev
      - name: Run integration & mock roundtrip tests
        run: uv run pytest -m "integration or mockserver" --tb=short -q

  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check all version files are in sync
        run: bash scripts/check-version-sync.sh

  mcp-integration:
    name: MCP Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Live smoke test against the REAL Unraid box (via repo secrets). The homelab
    # Unraid API lives on a private/Tailscale network that GitHub's cloud runners
    # cannot reach, so this can never pass on a hosted runner — it is therefore a
    # MANUAL job (workflow_dispatch), not an automatic PR/push check. Run it from a
    # tailnet-connected context (e.g. a self-hosted runner) when you want live
    # coverage. The no-secrets `e2e` job is the real automatic integration gate.
    continue-on-error: true
    needs: [lint, typecheck, test]
    if: github.event_name == 'workflow_dispatch'
    env:
      UNRAID_API_URL: ${{ secrets.UNRAID_API_URL }}
      UNRAID_API_KEY: ${{ secrets.UNRAID_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Run integration tests
        if: env.UNRAID_API_URL != '' && env.UNRAID_API_KEY != ''
        run: bash tests/test_live.sh

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          version: "0.9.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --locked
      - name: Dependency audit
        run: uvx pip-audit

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
