name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

# Least-privilege default for GITHUB_TOKEN; jobs elevate only if they need to.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "0.9.25"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Ruff check
        run: uv run ruff check unraid_mcp/ tests/
      - name: Ruff format
        run: uv run ruff format --check unraid_mcp/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "0.9.25"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: ty check
        run: uv run ty check unraid_mcp/

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "0.9.25"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run tests with coverage (excluding integration/slow)
        run: uv run pytest -m "not slow and not integration" --cov=unraid_mcp --cov-report=term-missing --tb=short -q

  no-plugin-version:
    name: No Plugin Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Plugin manifests must not declare a version (SHA-versioned)
        run: bash bin/check-no-plugin-version.sh

  mcp-integration:
    name: MCP Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      UNRAID_API_URL: ${{ secrets.UNRAID_API_URL }}
      UNRAID_API_KEY: ${{ secrets.UNRAID_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "0.9.25"
      - name: Run integration tests
        if: env.UNRAID_API_URL != '' && env.UNRAID_API_KEY != ''
        continue-on-error: true
        run: bash tests/test_live.sh

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "0.9.25"
      - name: Install dependencies
        run: uv sync --locked
      - name: Dependency audit
        run: uvx pip-audit

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
