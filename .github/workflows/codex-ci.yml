name: codex-ci

on:
  push:
    paths:
      - "plugins/codex/**"
      - ".github/workflows/codex-ci.yml"
  pull_request:
    paths:
      - "plugins/codex/**"
      - ".github/workflows/codex-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codex:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: plugins/codex
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Install static validators
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils shellcheck file
      - name: Run codex plugin contract tests
        run: ./tests/contract.sh
