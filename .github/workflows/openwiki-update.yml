name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: "0 8 * * *"

permissions:
  contents: read

jobs:
  generate:
    name: Generate untrusted OpenWiki artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: scripts/openwiki/package-lock.json

      - name: Connect Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: 100.120.242.29

      - name: Install checksum-locked OpenWiki
        run: |
          npm ci --prefix scripts/openwiki --ignore-scripts
          # --ignore-scripts skips native builds; better-sqlite3 needs its
          # binding compiled or OpenWiki dies with "Could not locate the
          # bindings file". Rebuild only that module.
          npm rebuild --prefix scripts/openwiki better-sqlite3

      - name: Preflight OpenWiki API
        env:
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: http://100.120.242.29:8317/v1
        run: |
          set -euo pipefail

          if [[ -z "${OPENAI_COMPATIBLE_API_KEY:-}" ]]; then
            echo "::error::OPENAI_COMPATIBLE_API_KEY is required for OpenWiki updates"
            exit 1
          fi

          response="$(mktemp)"
          status="$(
            curl --silent --show-error --location \
              --output "$response" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer ${OPENAI_COMPATIBLE_API_KEY}" \
              "${OPENAI_COMPATIBLE_BASE_URL%/}/models" || true
          )"
          if [[ "$status" != "200" ]]; then
            echo "::error::OpenWiki API preflight failed for ${OPENAI_COMPATIBLE_BASE_URL%/}/models with HTTP ${status}"
            head -c 300 "$response"
            echo
            exit 1
          fi

      - name: Run OpenWiki
        env:
          OPENWIKI_PROVIDER: openai-compatible
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: http://100.120.242.29:8317/v1
          OPENWIKI_MODEL_ID: gpt-5.3-codex-spark
        run: |
          set -euo pipefail

          if [[ -z "${OPENAI_COMPATIBLE_API_KEY:-}" ]]; then
            echo "::error::OPENAI_COMPATIBLE_API_KEY is required for OpenWiki updates"
            exit 1
          fi

          scripts/openwiki/node_modules/.bin/openwiki --update --print

      - name: Upload generated documentation only
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: openwiki-generated-${{ github.run_id }}
          path: openwiki/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  propose:
    name: Propose generated documentation
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download generated documentation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: openwiki-generated-${{ github.run_id }}
          path: openwiki

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ github.token }}
          add-paths: openwiki
          branch: openwiki/update
          delete-branch: true
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.
