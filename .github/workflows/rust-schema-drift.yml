name: rust-schema-drift

# Daily check: has Unraid's published GraphQL SDL drifted from the Rust server's
# vendored copy (unraid-rs/schema/unraid-schema.graphql)? The Python server pins
# the schema independently (docs/unraid/UNRAID-SCHEMA.graphql, guarded by
# schema-drift.yml), so this is a separate gate. A non-empty diff is the signal to
# re-vendor and let the cargo schema-contract test flag what changed.
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

defaults:
  run:
    working-directory: unraid-rs

jobs:
  drift:
    name: Compare vendored Rust SDL to unraid/api
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch upstream SDL
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/unraid/api/main/api/generated-schema.graphql \
            -o upstream-schema.graphql

      - name: Strip vendored provenance header
        run: |
          # Guard: without the marker, `sed '1,/pat/d'` deletes to EOF → an empty
          # body that reads as a full-file drift (loud false positive). Fail instead.
          grep -q 'VENDOR-HEADER-END' schema/unraid-schema.graphql \
            || { echo "::error::VENDOR-HEADER-END marker missing in schema/unraid-schema.graphql"; exit 1; }
          sed '1,/VENDOR-HEADER-END/d' schema/unraid-schema.graphql > vendored-body.graphql

      - name: Diff
        id: diff
        run: |
          if diff -u vendored-body.graphql upstream-schema.graphql > schema.diff; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "Vendored Unraid SDL is up to date."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "Unraid SDL has drifted from the vendored copy:"
            cat schema.diff
          fi

      - name: Open / update drift issue
        if: steps.diff.outputs.drift == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('unraid-rs/schema.diff', 'utf8').slice(0, 60000);
            const title = 'Unraid GraphQL schema drift detected (unraid-rs)';
            const body = [
              'The vendored `unraid-rs/schema/unraid-schema.graphql` no longer matches',
              'Unraid\'s published SDL (`unraid/api@main`).',
              '',
              'Re-vendor it (copy the upstream file, re-add the provenance header),',
              'then let the cargo schema-contract test surface which queries/fixtures',
              'need updating.',
              '',
              '<details><summary>diff</summary>',
              '',
              '```diff',
              diff,
              '```',
              '',
              '</details>',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'schema-drift-rust',
            });
            if (existing.data.length) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['schema-drift-rust'],
              });
            }
