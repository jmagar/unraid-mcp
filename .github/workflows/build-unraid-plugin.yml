name: Build Unraid Plugin

# Builds the unRAID plugin package (.txz) + manifest (.plg) and attaches them to
# the matching GitHub release. Self-contained: builds the wheel from source and
# vendors its own Python, so it does not race the PyPI publish.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version (e.g. 2.5.0). Defaults to the release tag."
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build & attach plugin artifacts
    # Only the primary (Python) release tag `v*` — NOT component tags
    # (incus-v*/codex-v*/unraid-rs-v*), which would fail version parsing.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.event.release.tag_name, 'v') &&
       !startsWith(github.event.release.tag_name, 'unraid-rs-v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release assets
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0

      - name: Resolve version
        id: v
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ github.event.inputs.version }}"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::invalid version '$version'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v7.1.0
        with:
          version: "0.9.25"
          enable-cache: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6.0.0
        with:
          node-version: "22"

      - name: Build wheel from source
        run: cd unraid-py && uv build --wheel --out-dir dist

      - name: Build plugin package
        run: |
          set -euo pipefail
          wheel="$(ls unraid-py/dist/unraid_mcp-${{ steps.v.outputs.version }}-py3-none-any.whl)"
          bash plugins/mcp/scripts/build-txz.sh "${{ steps.v.outputs.version }}" "$wheel"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: unraid-plugin-${{ steps.v.outputs.version }}
          path: |
            plugins/mcp/packages/unraid-mcp-${{ steps.v.outputs.version }}-x86_64-1.txz
            plugins/mcp/packages/unraid-mcp.plg
          retention-days: 14

      - name: Attach to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "plugins/mcp/packages/unraid-mcp-${{ steps.v.outputs.version }}-x86_64-1.txz" \
            "plugins/mcp/packages/unraid-mcp.plg" \
            --clobber
