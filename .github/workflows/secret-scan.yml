name: secret-scan

# CRITICAL: this workflow MUST run on every push/PR with NO paths filter.
# GitHub path filters are workflow-scoped, not job-scoped, so if secret scanning
# lived inside a path-filtered workflow it would stop running on PRs that touch
# only other subtrees. Keeping it here, unfiltered, scans the whole repo history
# on every change. Do not add a `paths:` filter.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Run gitleaks CLI
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum --check --quiet
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks git . --redact --verbose
