name: Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to reconcile (for example, v2.3.6)
        required: true
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

env:
  ARTIFACT_NAME: python-dist-${{ github.run_id }}
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}

jobs:
  build:
    name: Build & Attest Release Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    # Python package sources live in unraid-py/; build run: steps execute there.
    defaults:
      run:
        working-directory: unraid-py
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: refs/tags/${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.25"
          enable-cache: false
      - name: Verify tag matches package version
        run: |
          package_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml | head -n1)"
          test "$package_version" = "${RELEASE_TAG#v}"
      - name: Build package once from clean sources
        run: uv build --no-sources
      - name: Validate metadata, wheel contents, and installed stdio server
        run: |
          uv tool run --from twine==6.2.0 twine check dist/*
          unzip -l dist/*.whl | tee wheel-contents.txt
          grep -q 'unraid_mcp/server.py' wheel-contents.txt
          grep -q 'licenses/LICENSE' wheel-contents.txt
          uv venv --python 3.12 .release-venv
          uv pip install --python .release-venv/bin/python dist/*.whl
          bash scripts/smoke-stdio.sh .release-venv/bin/unraid-mcp-server
      - name: Generate consumer-verifiable checksums
        run: (cd dist && sha256sum -- * > SHA256SUMS)
      - name: Upload immutable internal release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: unraid-py/dist/
          if-no-files-found: error
          retention-days: 30
      - name: Attest exact wheel and source distribution
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            unraid-py/dist/*.whl
            unraid-py/dist/*.tar.gz
            unraid-py/dist/SHA256SUMS

  pypi:
    name: Publish PyPI Channel
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
      - name: Reconcile existing PyPI state
        id: state
        run: |
          version="${RELEASE_TAG#v}"
          if curl -fsS "https://pypi.org/pypi/unraid-mcp/${version}/json" > pypi-existing.json; then
            published=true
            while read -r checksum filename; do
              remote_checksum="$(
                jq -r --arg filename "$filename" \
                  '[.urls[] | select(.filename == $filename) | .digests.sha256][0] // empty' \
                  pypi-existing.json
              )"
              if [ -z "$remote_checksum" ]; then
                published=false
              elif [ "$remote_checksum" != "$checksum" ]; then
                echo "::error::PyPI already contains $filename with a different checksum"
                exit 1
              fi
            done < dist/SHA256SUMS
            echo "published=$published" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Remove non-distribution checksum manifest from upload directory
        if: steps.state.outputs.published != 'true'
        run: rm dist/SHA256SUMS
      - name: Publish exact artifact to PyPI idempotently
        if: steps.state.outputs.published != 'true'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: dist/
          attestations: true
          skip-existing: true

  github-release:
    name: Publish GitHub Release Channel
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
      - name: Attach exact artifacts and checksums idempotently
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber

  mcp-registry:
    name: Publish MCP Registry Channel
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: read
    # server.json (the MCP registry manifest) lives in unraid-py/; the publisher
    # binary is downloaded into and run from there too.
    defaults:
      run:
        working-directory: unraid-py
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: refs/tags/${{ env.RELEASE_TAG }}
      - name: Reconcile existing MCP Registry state
        id: state
        run: |
          version="${RELEASE_TAG#v}"
          url="https://registry.modelcontextprotocol.io/v0/servers/tv.tootie%2Funraid-mcp/versions/${version}"
          if curl -fsS "$url" > registry-existing.json; then
            jq -e --arg version "$version" '.server.version == $version' registry-existing.json
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Download checksum-pinned MCP publisher v1.8.0
        if: steps.state.outputs.published != 'true'
        run: |
          archive=mcp-publisher_linux_amd64.tar.gz
          curl --fail --silent --show-error --location \
            "https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/${archive}" \
            --output "$archive"
          printf '%s  %s\n' \
            1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf \
            "$archive" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" mcp-publisher
          test "$(./mcp-publisher --version 2>&1 | grep -o '1\.8\.0' | head -n1)" = "1.8.0"
      - name: Stamp immutable release version into registry manifest
        if: steps.state.outputs.published != 'true'
        run: |
          version="${RELEASE_TAG#v}"
          jq --arg version "$version" '
            .version = $version |
            .packages = [.packages[] | if .registryType == "pypi" then .version = $version else . end]
          ' server.json > server.release.json
          mv server.release.json server.json
      - name: Wait for release version to be visible on PyPI
        if: steps.state.outputs.published != 'true'
        run: |
          version="${RELEASE_TAG#v}"
          for attempt in {1..20}; do
            if curl -fsS "https://pypi.org/pypi/unraid-mcp/${version}/json" > /dev/null; then
              echo "PyPI reports unraid-mcp ${version} (attempt ${attempt})."
              exit 0
            fi
            echo "unraid-mcp ${version} not visible on PyPI yet (attempt ${attempt}/20); retrying in 15s."
            sleep 15
          done
          echo "::error::unraid-mcp ${version} never became visible on PyPI; registry validation would fail"
          exit 1
      - name: Authenticate to MCP Registry
        if: steps.state.outputs.published != 'true'
        env:
          MCP_PRIVATE_KEY: ${{ secrets.MCP_PRIVATE_KEY }}
        run: ./mcp-publisher login dns --domain tootie.tv --private-key "$MCP_PRIVATE_KEY"
      - name: Publish MCP Registry channel
        if: steps.state.outputs.published != 'true'
        run: |
          for attempt in {1..3}; do
            if ./mcp-publisher publish; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "mcp-publisher publish failed (attempt ${attempt}/3); retrying in 30s."
              sleep 30
            fi
          done
          echo "::error::MCP Registry publish failed after 3 attempts"
          exit 1

  reconcile:
    name: Release Reconciliation
    needs: [build, pypi, github-release, mcp-registry]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
      - name: Verify checksums and PyPI digests
        run: |
          (cd dist && sha256sum --check SHA256SUMS)
          version="${RELEASE_TAG#v}"
          curl -fsS "https://pypi.org/pypi/unraid-mcp/${version}/json" > pypi.json
          while read -r checksum filename; do
            jq -e --arg filename "$filename" --arg checksum "$checksum" \
              '.urls[] | select(.filename == $filename and .digests.sha256 == $checksum)' pypi.json >/dev/null
          done < dist/SHA256SUMS
      - name: Verify GitHub Release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir github-assets
          gh release download "$RELEASE_TAG" --dir github-assets --pattern 'unraid_mcp-*' --pattern SHA256SUMS
          (cd github-assets && sha256sum --check SHA256SUMS)
          diff -rq dist github-assets
      - name: Verify MCP Registry version
        run: |
          version="${RELEASE_TAG#v}"
          curl -fsS \
            "https://registry.modelcontextprotocol.io/v0/servers/tv.tootie%2Funraid-mcp/versions/${version}" |
            jq -e --arg version "$version" '.server.version == $version and .server.packages[0].version == $version'
      - name: Wait for matching GHCR release and latest digests
        run: |
          version="${RELEASE_TAG#v}"
          for _ in {1..30}; do
            version_digest="$(docker buildx imagetools inspect "ghcr.io/${GITHUB_REPOSITORY}:${version}" --format '{{json .Manifest}}' 2>/dev/null | jq -r '.digest // empty')"
            latest_digest="$(docker buildx imagetools inspect "ghcr.io/${GITHUB_REPOSITORY}:latest" --format '{{json .Manifest}}' 2>/dev/null | jq -r '.digest // empty')"
            if [[ -n "$version_digest" && "$version_digest" = "$latest_digest" ]]; then
              echo "GHCR ${version} and latest reconcile to ${version_digest}."
              exit 0
            fi
            sleep 10
          done
          echo "::error::GHCR version and latest tags did not reconcile"
          exit 1
