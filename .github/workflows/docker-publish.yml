name: Container Artifact

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TEST_IMAGE: local/unraid-mcp:${{ github.sha }}

jobs:
  validate:
    name: Container Artifact Smoke & Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build exact test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.TEST_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Assert runtime image omits package managers and build tooling
        run: |
          docker run --rm --entrypoint sh "$TEST_IMAGE" -c '
            ! command -v pip &&
            ! command -v pip3 &&
            python -c "import importlib.util; assert importlib.util.find_spec(\"pip\") is None; assert importlib.util.find_spec(\"setuptools\") is None; assert importlib.util.find_spec(\"wheel\") is None"
          '
      - name: Start deterministic readiness mock upstream
        run: |
          python3 scripts/readiness_mock.py 9002 >mock.log 2>&1 &
          echo $! > mock.pid
          for _ in {1..20}; do
            curl -fsS http://127.0.0.1:9002/health >/dev/null && exit 0
            sleep 1
          done
          cat mock.log
          exit 1
      - name: Start built image and smoke HTTP, readiness, and MCP
        env:
          TOKEN: ci-artifact-token
        run: |
          docker run --detach --name unraid-mcp-artifact --network host \
            --env UNRAID_API_URL=http://127.0.0.1:9002/graphql \
            --env UNRAID_API_KEY=ci-fake-key \
            --env UNRAID_MCP_BEARER_TOKEN="$TOKEN" \
            "$TEST_IMAGE"
          trap 'docker logs unraid-mcp-artifact || true; docker rm -f unraid-mcp-artifact || true; kill "$(cat mock.pid)" || true' EXIT
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:6970/health >/dev/null && \
               curl -fsS http://127.0.0.1:6970/ready >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:6970/health | jq -e '.status == "ok"'
          curl -fsS http://127.0.0.1:6970/ready | jq -e '.status == "ready"'
          bash tests/test_live.sh --mode http \
            --url http://127.0.0.1:6970/mcp \
            --token "$TOKEN" --skip-tools
      - name: Scan exact test image for fixable High or Critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.TEST_IMAGE }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  publish:
    name: Publish Attested Container
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          package_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml | head -n1)"
          test "$package_version" = "${GITHUB_REF_NAME#v}"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive release and edge tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha
      - name: Build and publish the attested multi-architecture image once
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
      - name: Record immutable published digest
        run: |
          test -n "${{ steps.build.outputs.digest }}"
          printf '%s@%s\n' \
            "${REGISTRY}/${IMAGE_NAME}" \
            "${{ steps.build.outputs.digest }}" | tee image-digest.txt
      - name: Scan published digest
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload advisory scan results
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: trivy-results.sarif
