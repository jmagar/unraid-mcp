name: unraid-api-plugin-incus CI

on:
  push:
    branches: [main]
    paths:
      - "unraid-api-plugin-incus/**"
      - ".github/workflows/api-plugin-ci.yml"
  pull_request:
    paths:
      - "unraid-api-plugin-incus/**"
      - ".github/workflows/api-plugin-ci.yml"
  workflow_dispatch:

# This covers the NestJS/GraphQL backend and Vue frontend. Classic package
# verification is handled by classic-plugin-ci.yml.

jobs:
  backend:
    name: Backend (unraid-api-plugin-incus) — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unraid-api-plugin-incus
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      # peerDependencies (@nestjs/*, class-validator, class-transformer) are
      # normally provided by the real unraid-api host at deploy time — this
      # repo never vendors them. For CI we install the real published NestJS
      # packages (best-effort proxy for whatever version the actual host
      # runs; re-pin here if that's ever confirmed) so the typecheck exercises
      # real APIs, plus a local stub for @unraid/shared, the one peer with no
      # public npm package (it's Unraid's internal, private monorepo).
      # --no-save: peerDependencies stay peer — CI installing them shouldn't
      # change what this package declares it needs from its host.
      - name: Install peer dependencies for typecheck (host-provided at real deploy time)
        run: |
          npm install --no-save --no-package-lock \
            @nestjs/common@11.1.28 @nestjs/config@4.0.4 @nestjs/graphql@13.4.2 \
            class-transformer@0.5.1 class-validator@0.15.1 \
            @unraid/shared@file:.ci-stubs/unraid-shared

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Enforce coverage floor
        run: npm run test:coverage

      - name: Build
        run: npx tsc

      - name: Verify coordinated classic payload matches this backend build
        run: |
          plugin_name="$(sed -n 's/.*<!ENTITY name[[:space:]]*"\([^"]*\)".*/\1/p' ../incus.plg)"
          txz="$(sed -n 's/.*<!ENTITY txz[[:space:]]*"\([^"]*\)".*/\1/p' ../incus.plg)"
          txz="${txz//&name;/$plugin_name}"
          archive="../packages/$txz"
          stage="$(mktemp -d)"
          trap 'rm -rf "$stage"' EXIT
          tar -xJf "$archive" -C "$stage" \
            usr/local/emhttp/plugins/incus/api-plugin
          payload="$stage/usr/local/emhttp/plugins/incus/api-plugin"
          diff -qr dist "$payload/dist"
          cmp package.json "$payload/package.json"
          cmp package-lock.json "$payload/package-lock.json"
          for dependency in ws graphql-subscriptions; do
            test -f "$payload/node_modules/$dependency/package.json"
          done

      - name: Upload dist/
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unraid-api-plugin-incus-dist
          path: unraid-api-plugin-incus/dist/
          retention-days: 14

  frontend:
    name: Frontend (web/) — typecheck + build (settings + dashboard bundles)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unraid-api-plugin-incus/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: unraid-api-plugin-incus/web/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx vue-tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Enforce coverage floor
        run: npm run test:coverage

      - name: Build (both bundles — npm run build chains build:settings + build:dashboard)
        run: npm run build

      - name: Verify deployed bundles match frontend source build
        run: |
          for asset in ../../unraid-api-plugin-incus/dist-web/*; do
            cmp "$asset" "../../source/usr/local/emhttp/plugins/incus/web/$(basename "$asset")"
          done
          cmp ../../unraid-api-plugin-incus/dist-web-dashboard/incus-dashboard.js \
            ../../source/usr/local/emhttp/plugins/incus/web/incus-dashboard.js

      - name: Upload incus-settings bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: incus-settings-bundle
          path: unraid-api-plugin-incus/dist-web/
          retention-days: 14

      - name: Upload incus-dashboard bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: incus-dashboard-bundle
          path: unraid-api-plugin-incus/dist-web-dashboard/
          retention-days: 14
