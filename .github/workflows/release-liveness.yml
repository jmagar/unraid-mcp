name: Release Liveness

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  monitor:
    name: Release Automation Liveness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect stale release automation
        # SCOPE: monitors only the primary Python component (unraid-py -> v*).
        # rust/incus/codex releases are NOT liveness-checked here — plan Task 13c
        # sanctioned scoping to the primary and documenting it. If a component
        # release stalls, no alert fires; generalize this over all manifest keys
        # if that coverage becomes necessary.
        run: |
          set -euo pipefail
          released_version="$(jq -r '.["unraid-py"]' .release-please-manifest.json)"
          released_tag="v${released_version}"
          git rev-parse "$released_tag" >/dev/null
          releasable_commits="$(git log --format=%s "${released_tag}..origin/main" | grep -Ec '^(feat|fix|perf|revert)(\([^)]*\))?!?: ' || true)"
          release_pr="$(gh pr list --state open --label 'autorelease: pending' --json number,updatedAt,url --jq 'sort_by(.updatedAt) | last // empty')"
          issue_title="Release automation liveness failure"
          gh label create release-liveness --color b60205 \
            --description "Release automation failed its liveness SLA" >/dev/null 2>&1 || true
          issue_number="$(gh issue list --state open --search "${issue_title} in:title" --json number,title --jq ".[] | select(.title == \"${issue_title}\") | .number" | head -n1)"

          healthy=false
          if [[ "$releasable_commits" -eq 0 ]]; then
            healthy=true
          elif [[ -n "$release_pr" ]]; then
            updated_at="$(jq -r .updatedAt <<<"$release_pr")"
            updated_epoch="$(date -u -d "$updated_at" +%s)"
            now_epoch="$(date -u +%s)"
            if (( now_epoch - updated_epoch < 172800 )); then
              healthy=true
            fi
          fi

          if [[ "$healthy" == true ]]; then
            if [[ -n "$issue_number" ]]; then
              gh issue close "$issue_number" --comment "Release automation is responsive again."
            fi
            exit 0
          fi

          body="release-please has ${releasable_commits} releasable commit(s) after ${released_tag}, but no release PR has updated within 48 hours. Check the release-please workflow and rotate RELEASE_PLEASE_TOKEN or replace it with a GitHub App credential. See unraid-py/docs/mcp/PUBLISH.md#release-automation-liveness."
          if [[ -n "$issue_number" ]]; then
            gh issue comment "$issue_number" --body "$body"
          else
            gh issue create --title "$issue_title" --label release-liveness --body "$body"
          fi
          echo "::error::release-please appears stale"
          exit 1
