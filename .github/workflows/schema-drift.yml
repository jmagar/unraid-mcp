name: Schema drift

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  drift:
    name: Compare vendored Unraid SDL to upstream
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Fetch upstream SDL
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/unraid/api/main/api/generated-schema.graphql \
            -o upstream-schema.graphql

      - name: Diff vendored schema
        id: diff
        run: |
          if diff -u docs/unraid/UNRAID-SCHEMA.graphql upstream-schema.graphql > schema.diff; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "Vendored Unraid SDL is up to date."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "Unraid SDL has drifted from the vendored copy:"
            cat schema.diff
          fi

      - name: Set up uv
        if: steps.diff.outputs.drift == 'true'
        uses: astral-sh/setup-uv@v6

      - name: Summarize structured schema changes
        if: steps.diff.outputs.drift == 'true'
        run: |
          uv run python -m unraid_mcp.devtools.schema_diff_summary \
            docs/unraid/UNRAID-SCHEMA.graphql \
            upstream-schema.graphql \
            > schema-summary.md

      - name: Open or update drift issue
        id: issue
        if: steps.diff.outputs.drift == 'true'
        run: |
          title="Unraid GraphQL schema drift detected"
          schema_hash="$(sha256sum upstream-schema.graphql | awk '{print $1}')"
          {
            echo "<!-- upstream-schema-sha256: ${schema_hash} -->"
            echo
            echo "The vendored \`docs/unraid/UNRAID-SCHEMA.graphql\` no longer matches"
            echo "Unraid's published SDL at \`unraid/api@main\`."
            echo
            echo "Re-vendor the schema, then run the schema and dispatch contract tests"
            echo "to surface which queries, mutations, and mock responses need updates."
            echo
            cat schema-summary.md
            echo
            echo "## Suggested agent follow-up"
            echo
            echo "Ask an implementation agent to read this issue, update support for the"
            echo "new Unraid GraphQL API surface, run schema + dispatch contract tests,"
            echo "and open a PR with the required code/docs/test changes."
            echo
            echo "<details><summary>diff</summary>"
            echo
            echo "\`\`\`diff"
            head -c 60000 schema.diff
            echo
            echo "\`\`\`"
            echo
            echo "</details>"
          } > issue-body.md

          existing="$(
            gh issue list \
              --state open \
              --search "$title in:title" \
              --json number \
              --jq ".[0].number // \"\""
          )"
          previous_hash=""
          if [ -n "$existing" ]; then
            previous_hash="$(
              gh issue view "$existing" \
                --json body \
                --jq ".body" |
                sed -n 's/.*<!-- upstream-schema-sha256: \([0-9a-f]\{64\}\) -->.*/\1/p' |
                head -n 1
            )"
            gh issue edit "$existing" --body-file issue-body.md
            issue_number="$existing"
          else
            issue_url="$(gh issue create --title "$title" --body-file issue-body.md)"
            issue_number="${issue_url##*/}"
          fi
          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"
          echo "schema_hash=${schema_hash}" >> "$GITHUB_OUTPUT"
          if [ "$previous_hash" = "$schema_hash" ]; then
            echo "dispatch_claude=false" >> "$GITHUB_OUTPUT"
            echo "Schema hash ${schema_hash} already has a drift issue; skipping Claude dispatch."
          else
            echo "dispatch_claude=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Claude schema drift implementer
        if: steps.issue.outputs.dispatch_claude == 'true'
        run: |
          gh workflow run claude-schema-drift.yml \
            --ref main \
            -f issue_number="${{ steps.issue.outputs.issue_number }}" \
            -f schema_hash="${{ steps.issue.outputs.schema_hash }}"

      - name: Close resolved drift issue
        if: steps.diff.outputs.drift == 'false'
        run: |
          title="Unraid GraphQL schema drift detected"
          existing="$(
            gh issue list \
              --state open \
              --search "$title in:title" \
              --json number \
              --jq ".[0].number // \"\""
          )"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" \
              --body "The vendored Unraid SDL now matches \`unraid/api@main\`; closing this drift report."
            gh issue close "$existing" \
              --comment "Schema drift resolved by the current vendored SDL."
          fi
