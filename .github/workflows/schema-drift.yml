name: Schema drift

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  drift:
    name: Compare vendored Unraid SDL to upstream
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch upstream SDL
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/unraid/api/main/api/generated-schema.graphql \
            -o upstream-schema.graphql

      - name: Diff vendored schema
        id: diff
        run: |
          if diff -u docs/unraid/UNRAID-SCHEMA.graphql upstream-schema.graphql > schema.diff; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "Vendored Unraid SDL is up to date."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "Unraid SDL has drifted from the vendored copy:"
            cat schema.diff
          fi

      - name: Set up uv
        if: steps.diff.outputs.drift == 'true'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86

      - name: Summarize structured schema changes
        if: steps.diff.outputs.drift == 'true'
        run: |
          uv run python -m unraid_mcp.devtools.schema_diff_summary \
            docs/unraid/UNRAID-SCHEMA.graphql \
            upstream-schema.graphql \
            > schema-summary.md

      - name: Upload full schema drift artifacts
        if: steps.diff.outputs.drift == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unraid-schema-drift-${{ github.run_id }}
          path: |
            schema.diff
            schema-summary.md
            upstream-schema.graphql
          retention-days: 14

      - name: Open or update drift issue
        id: issue
        if: steps.diff.outputs.drift == 'true'
        run: |
          title="Unraid GraphQL schema drift detected"
          label="schema-drift"
          schema_hash="$(sha256sum upstream-schema.graphql | awk '{print $1}')"
          gh label create "$label" \
            --color "d73a4a" \
            --description "Automated upstream Unraid GraphQL schema drift reports" \
            >/dev/null 2>&1 || true

          {
            echo "<!-- upstream-schema-sha256: ${schema_hash} -->"
            echo
            echo "The vendored \`docs/unraid/UNRAID-SCHEMA.graphql\` no longer matches"
            echo "Unraid's published SDL at \`unraid/api@main\`."
            echo
            echo "Re-vendor the schema, then run the schema and dispatch contract tests"
            echo "to surface which queries, mutations, and mock responses need updates."
            echo
            echo "The complete \`schema.diff\`, \`schema-summary.md\`, and"
            echo "\`upstream-schema.graphql\` are attached to this workflow run as"
            echo "the \`unraid-schema-drift-${GITHUB_RUN_ID}\` artifact."
            echo
            echo "## Structured schema changes"
            echo
          } > issue-body.md

          max_body_bytes=60000
          append_with_budget() {
            file="$1"
            section_label="$2"
            reserve="$3"
            current_bytes="$(wc -c < issue-body.md)"
            remaining_bytes="$((max_body_bytes - current_bytes - reserve))"
            if [ "$remaining_bytes" -le 0 ]; then
              {
                echo
                echo "_${section_label} omitted to keep this issue body under ${max_body_bytes} bytes._"
                echo "_See the workflow artifact for the complete content._"
              } >> issue-body.md
              return
            fi

            file_bytes="$(wc -c < "$file")"
            if [ "$file_bytes" -gt "$remaining_bytes" ]; then
              head -c "$remaining_bytes" "$file" >> issue-body.md
              {
                echo
                echo
                echo "_${section_label} truncated to keep this issue body under ${max_body_bytes} bytes._"
                echo "_See the workflow artifact for the complete content._"
              } >> issue-body.md
            else
              cat "$file" >> issue-body.md
            fi
          }

          append_with_budget schema-summary.md "Structured schema summary" 14000

          {
            echo
            echo "## Suggested agent follow-up"
            echo
            echo "Ask an implementation agent to read this issue, update support for the"
            echo "new Unraid GraphQL API surface, run schema + dispatch contract tests,"
            echo "and open a PR with the required code/docs/test changes."
            echo
            echo "<details><summary>diff</summary>"
            echo
            echo "\`\`\`diff"
          } >> issue-body.md

          append_with_budget schema.diff "Schema diff" 300

          {
            echo
            echo "\`\`\`"
            echo
            echo "</details>"
          } >> issue-body.md

          existing="$(
            gh issue list \
              --state open \
              --search "$title in:title" \
              --json number,title,body \
              --jq ".[] | select(.title == \"$title\") | select((.body // \"\") | contains(\"<!-- upstream-schema-sha256:\")) | .number" |
              head -n 1
          )"
          previous_hash=""
          if [ -n "$existing" ]; then
            previous_hash="$(
              gh issue view "$existing" \
                --json body \
                --jq ".body" |
                sed -n 's/.*<!-- upstream-schema-sha256: \([0-9a-f]\{64\}\) -->.*/\1/p' |
                head -n 1
            )"
            gh issue edit "$existing" --body-file issue-body.md
            gh issue edit "$existing" --add-label "$label"
            issue_number="$existing"
          else
            issue_url="$(gh issue create --title "$title" --label "$label" --body-file issue-body.md)"
            issue_number="${issue_url##*/}"
          fi
          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"
          echo "schema_hash=${schema_hash}" >> "$GITHUB_OUTPUT"
          if [ "$previous_hash" = "$schema_hash" ]; then
            echo "dispatch_claude=false" >> "$GITHUB_OUTPUT"
            echo "Schema hash ${schema_hash} already has a drift issue; skipping Claude dispatch."
          else
            echo "dispatch_claude=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Claude schema drift implementer
        if: steps.issue.outputs.dispatch_claude == 'true'
        run: |
          gh workflow run claude-schema-drift.yml \
            --ref main \
            -f issue_number="${{ steps.issue.outputs.issue_number }}" \
            -f schema_hash="${{ steps.issue.outputs.schema_hash }}"

      - name: Close resolved drift issue
        if: steps.diff.outputs.drift == 'false'
        run: |
          title="Unraid GraphQL schema drift detected"
          label="schema-drift"
          gh label create "$label" \
            --color "d73a4a" \
            --description "Automated upstream Unraid GraphQL schema drift reports" \
            >/dev/null 2>&1 || true

          existing="$(
            gh issue list \
              --state open \
              --json number,title,body \
              --jq ".[] | select(.title == \"$title\") | select((.body // \"\") | contains(\"<!-- upstream-schema-sha256:\")) | .number" |
              head -n 1
          )"
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --add-label "$label"
            gh issue comment "$existing" \
              --body "The vendored Unraid SDL now matches \`unraid/api@main\`; closing this drift report."
            gh issue close "$existing" \
              --comment "Schema drift resolved by the current vendored SDL."
          fi
