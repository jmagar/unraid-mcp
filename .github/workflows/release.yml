name: Release

# Triggers on the vX.Y.Z tag that release-please pushes (via
# RELEASE_PLEASE_TOKEN, so this workflow actually fires — the default
# GITHUB_TOKEN would not trigger it). Builds the release binary and attaches
# it to the GitHub Release release-please already created; it does not
# create a new release or touch the changelog-based release notes
# release-please wrote.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: runraid

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          dst="${{ matrix.artifact }}-${{ matrix.target }}"
          mv "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ matrix.target }}
          path: ${{ matrix.artifact }}-${{ matrix.target }}

  release:
    name: Attach Release Assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      # Adds these assets to the release-please-created release for this tag.
      # No `generate_release_notes`/`body` here — that would overwrite the
      # changelog-based notes release-please already wrote.
      - name: Attach binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
