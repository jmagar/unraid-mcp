# Gitleaks config for the Secret Scan CI job (.github/workflows/secret-scan.yml),
# which runs `gitleaks git .` — GIT MODE, so only tracked/committed content is
# scanned (build artifacts like unraid-rs/target/ are never seen).
#
# ACCEPTED-RISK TRADEOFF (reviewed): these paths hold realistic-looking PLACEHOLDER
# credentials — docs examples, generated openwiki, and test fixtures/test code that
# exercise request construction with fake keys. gitleaks cannot distinguish a fake
# fixture key from a real one by content, so without this allowlist ~7 tracked test
# files produce false positives and fail CI. The cost is that a *real* secret
# accidentally committed under one of these paths would not be caught here — a
# minor, documented risk mitigated by the clean pre-consolidation history scan and
# by code review. Do NOT widen these paths; do NOT commit real secrets under them.
#
# NOTE: the previous per-crate unraid-rs/.gitleaks.toml was dead (never loaded by
# the root-run CI) and has been removed.

[extend]
useDefault = true

[allowlist]
description = "Docs, generated wiki, tests, and skill references use placeholder credentials only"
paths = [
  '''(^|/)docs/''',
  '''(^|/)openwiki/''',
  '''(^|/)tests/''',
  '''(^|/)skills/''',
]
