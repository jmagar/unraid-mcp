repos:
  - repo: local
    hooks:
      - id: skills-validate
        name: Validate skills
        entry: just validate-skills
        language: system
        pass_filenames: false

      - id: block-env-commits
        name: Block .env file commits (allow only .env.example)
        entry: bash bin/block-env-commits.sh
        language: system
        pass_filenames: false
        files: '\.env'
        exclude: '\.env\.example$'
